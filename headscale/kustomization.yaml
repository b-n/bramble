---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: headscale

resources:
# Dependencies: infra
- gateway.yaml
- httproute.yaml
- certificate.yaml
- ../ext/middlewares
# Main deployment
- statefulset-headscale.yaml
- statefulset-headplane.yaml
- service-headscale.yaml
- service-headplane.yaml

configMapGenerator:
- name: headscale-config
  files:
  - config-headscale.yaml
- name: headscale-headplane-config
  files:
  - config-headplane.yaml


generators:
- |-
  apiVersion: viaduct.ai/v1
  kind: ksops
  metadata:
    name: headscale
    annotations:
      config.kubernetes.io/function: |
        exec:
          path: ksops
  files:
  - secret-headscale-keys.enc.yaml
  - secret-headplane.enc.yaml
